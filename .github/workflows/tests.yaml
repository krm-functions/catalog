name: Run tests

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "scripts/**"
      - "docs/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install devbox
      uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0

    - name: build local binaries for test
      run: devbox run -- make build lint test

    - name: e2e tests
      run: devbox run -- make e2e-tests
